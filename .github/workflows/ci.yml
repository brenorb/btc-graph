name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content graph
        run: npm run build:data

      - name: Run tests
        run: npm test

      - name: Check resource links
        run: npm run check:links

      - name: Build site
        run: npm run build
